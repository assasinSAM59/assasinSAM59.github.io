<html lang="en">
<head>
<meta charset="UTF-8">

<title>assasinSAM — Game Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red:       #e50000;
    --red-bright:#ff2222;
    --red-dim:   #6a0000;
    --red-glow:  rgba(229,0,0,0.30);
    --gold:      #c9a84c;
    --cyan:      #00e5ff;
    --green:     #39ff14;
    --purple:    #b040ff;
    --bg:        #030303;
    --bg2:       #090909;
    --bg3:       #0f0f0f;
    --border:    #1e0000;
    --text:      #e8e8e8;
    --text-dim:  #777;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* scanlines */
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);
    pointer-events:none; z-index:9999;
  }
  /* outer red border frame */
  body::after {
    content:'';
    position:fixed; inset:0;
    border:3px solid var(--red);
    box-shadow:inset 0 0 50px rgba(229,0,0,.10), 0 0 70px rgba(229,0,0,.15);
    pointer-events:none; z-index:9998;
  }

  /* HEADER */
  header {
    position:relative;
    text-align:center;
    padding:56px 20px 36px;
    background:linear-gradient(180deg,#0c0000 0%,var(--bg) 100%);
    border-bottom:2px solid var(--red);
    overflow:hidden;
  }
  header::before {
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(ellipse 65% 45% at 50% 0%,rgba(229,0,0,.22) 0%,transparent 70%);
  }
  .co { position:absolute; width:52px; height:52px; border-color:var(--red); border-style:solid; opacity:.6; }
  .co.tl{top:10px;left:10px; border-width:2px 0 0 2px;}
  .co.tr{top:10px;right:10px;border-width:2px 2px 0 0;}
  .co.bl{bottom:10px;left:10px;border-width:0 0 2px 2px;}
  .co.br{bottom:10px;right:10px;border-width:0 2px 2px 0;}

  .site-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(60px,12vw,136px);
    letter-spacing:8px; line-height:1;
    color:#fff;
    text-shadow:0 0 8px var(--red),0 0 28px var(--red),0 0 55px var(--red-glow),4px 4px 0 var(--red-dim);
    position:relative;
    animation:flicker 7s infinite;
  }
  @keyframes flicker{0%,93%,95%,100%{opacity:1}94%{opacity:.8;text-shadow:0 0 4px var(--red);}}
  .site-name em { color:var(--red-bright); font-style:normal; }

  .tagline {
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(11px,2.2vw,15px);
    color:var(--gold);
    letter-spacing:5px;
    text-transform:uppercase;
    margin-top:8px; position:relative;
  }
  .tagline::before,.tagline::after{content:'//';color:var(--red-dim);margin:0 10px;}

  .stat-bar {
    display:flex; justify-content:center; gap:32px; margin-top:28px; flex-wrap:wrap;
  }
  .stat { text-align:center; }
  .stat-num {
    font-family:'Bebas Neue',sans-serif; font-size:40px;
    color:var(--red-bright); text-shadow:0 0 10px var(--red-glow); line-height:1;
  }
  .stat-label {
    font-family:'Share Tech Mono',monospace; font-size:9px;
    color:var(--text-dim); letter-spacing:2.5px; text-transform:uppercase;
  }
  .stat-div { width:1px; background:linear-gradient(180deg,transparent,var(--red),transparent); align-self:stretch; }

  /* GLITCH LINE */
  .glitch-line {
    height:2px;
    background:linear-gradient(90deg,transparent,var(--red),var(--cyan),var(--red),transparent);
    background-size:200% 100%;
    animation:gslide 4s linear infinite;
  }
  @keyframes gslide{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* NAV */
  nav {
    display:flex; justify-content:center; gap:0;
    border-bottom:2px solid var(--red);
    background:var(--bg2);
    flex-wrap:wrap;
    position:sticky; top:0; z-index:100;
  }
  nav button {
    background:transparent; border:none;
    color:var(--text-dim);
    font-family:'Bebas Neue',sans-serif;
    font-size:17px; letter-spacing:3px;
    padding:15px 28px;
    cursor:pointer; transition:all .2s;
    border-right:1px solid #180000;
    position:relative;
  }
  nav button::after {
    content:''; position:absolute; bottom:0; left:0; right:0;
    height:2px; background:var(--red-bright);
    transform:scaleX(0); transition:transform .2s;
  }
  nav button:hover,nav button.active { color:#fff; background:rgba(229,0,0,.07); }
  nav button:hover::after,nav button.active::after { transform:scaleX(1); }
  nav button.active { color:var(--red-bright); text-shadow:0 0 10px var(--red-glow); }
  .ndot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-left:7px; vertical-align:middle; }

  /* SECTIONS */
  .section { display:none; padding:44px 20px; max-width:1700px; margin:0 auto; }
  .section.active { display:block; }

  .sec-head {
    display:flex; align-items:center; gap:16px;
    margin-bottom:36px;
    border-left:4px solid var(--red);
    padding-left:18px;
  }
  .sec-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(32px,5vw,50px); letter-spacing:4px; line-height:1;
  }
  .sec-count {
    font-family:'Share Tech Mono',monospace;
    font-size:11px; color:var(--text-dim); letter-spacing:2px;
    align-self:flex-end; padding-bottom:5px;
  }

  /* LEGEND */
  .legend {
    display:flex; gap:20px; flex-wrap:wrap;
    margin-bottom:28px;
    padding:14px 18px;
    background:var(--bg2);
    border-left:2px solid var(--red-dim);
  }
  .leg-item {
    display:flex; align-items:center; gap:7px;
    font-family:'Share Tech Mono',monospace;
    font-size:10px; color:var(--text-dim); letter-spacing:1px;
  }
  .leg-dot { width:9px; height:9px; border-radius:1px; flex-shrink:0; }

  /* GAME GRID */
  .game-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:16px;
  }

  /* GAME CARD */
  .game-card {
    position:relative;
    background:var(--bg3);
    border:1px solid var(--border);
    transition:transform .22s ease, box-shadow .22s ease;
    overflow:hidden;
  }
  .game-card:hover {
    transform:translateY(-5px);
    box-shadow:0 10px 32px rgba(229,0,0,.28), 0 0 0 1px var(--red);
    z-index:10;
  }
  .game-card a.card-link {
    position:absolute; inset:0; z-index:5;
  }

  /* IMAGE WRAPPER — Steam header.jpg is 460x215 */
  .game-img-wrap {
    position:relative;
    width:100%;
    aspect-ratio:460/215;
    overflow:hidden;
    background:#0a0000;
  }
  .game-img-wrap img {
    width:100%; height:100%;
    object-fit:cover; display:block;
    transition:transform .32s ease, filter .22s ease;
    filter:brightness(.88) saturate(.8);
  }
  .game-card:hover .game-img-wrap img {
    transform:scale(1.07);
    filter:brightness(1) saturate(1);
  }
  .img-overlay {
    position:absolute; inset:0;
    background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.85) 100%);
    z-index:1;
  }

  /* fallback placeholder */
  .game-img-wrap .placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#100000,#1a0000);
    border-bottom:1px solid var(--red-dim);
  }
  .game-img-wrap .placeholder span {
    font-family:'Bebas Neue',sans-serif;
    font-size:12px; letter-spacing:1.5px;
    color:var(--red-dim); text-align:center;
    padding:8px; line-height:1.35;
  }

  /* STATUS BADGE */
  .badge {
    position:absolute; top:7px; right:7px; z-index:3;
    font-family:'Share Tech Mono',monospace;
    font-size:8px; letter-spacing:1px;
    padding:3px 7px;
    text-transform:uppercase; font-weight:700;
  }
  .b-playing   { background:var(--cyan); color:#000; }
  .b-done      { background:var(--green); color:#000; }
  .b-unfinished{ background:var(--gold); color:#000; }
  .b-pending   { background:#222; color:#666; border:1px solid #333; }

  /* CARD INFO */
  .game-info { padding:10px 11px 12px; }
  .game-title {
    font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:13px; color:#fff; line-height:1.3;
  }
  .reason-tag {
    display:inline-block;
    font-family:'Share Tech Mono',monospace;
    font-size:9px; padding:2px 6px; margin-top:5px; border-radius:2px;
  }
  .rt-technical { background:rgba(229,0,0,.15); color:var(--red-bright); border:1px solid var(--red-dim); }
  .rt-interest  { background:rgba(80,80,80,.15); color:#777; border:1px solid #2a2a2a; }
  .rt-hard      { background:rgba(176,64,255,.12); color:var(--purple); border:1px solid rgba(176,64,255,.4); }
  .rt-planned   { background:rgba(0,229,255,.08); color:var(--cyan); border:1px solid rgba(0,229,255,.3); }

  .nolink-icon {
    position:absolute; bottom:8px; right:8px; z-index:4;
    font-size:11px; color:#333; opacity:0; transition:opacity .2s;
    pointer-events:none;
  }
  .game-card:hover .nolink-icon { opacity:1; }

  /* FOOTER */
  footer {
    text-align:center;
    padding:28px 20px;
    border-top:1px solid #160000;
    margin-top:40px;
  }
  footer p {
    font-family:'Share Tech Mono',monospace;
    font-size:10px; color:#2a2a2a;
    letter-spacing:3px; text-transform:uppercase;
    line-height:2;
  }
  footer p span { color:var(--red-dim); }

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--red-dim);}
  ::-webkit-scrollbar-thumb:hover{background:var(--red);}

  @media(max-width:600px){
    .game-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
    nav button{padding:12px 14px;font-size:14px;}
  }
</style>
</head>
